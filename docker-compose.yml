services:
  app:
    build: .
    container_name: eccommerce_api

    ports:
      - "8000:8000"
    
    env_file:
      - .env

    depends_on:
      - postgres

  postgres:
    image: postgres:17

    container_name: postgres_db

    ports:
      - "5432:5432"

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
